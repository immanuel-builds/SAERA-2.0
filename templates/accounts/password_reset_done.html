{% extends 'base.html' %}

{% block title %}Email Sent - SAERA Scanner{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="cyber-card p-5 text-center" style="max-width: 500px;">
        <div class="mb-4 text-success fs-1">
            <i class="bi bi-envelope-check-fill"></i>
        </div>
        <h2 class="text-white mb-3">Transmission Successful</h2>
        <p class="text-muted mb-4">
            A secure recovery link has been dispatched to your email address. Please check your inbox (and spam folder) for further instructions.
        </p>
        <div class="d-grid">
            <a href="{% url 'login' %}" class="btn btn-outline-primary">Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}
