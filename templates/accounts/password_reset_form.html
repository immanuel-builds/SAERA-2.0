{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - NetVuln{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, rgba(2, 6, 23, 0.6) 0%, rgba(2, 6, 23, 0.95) 100%);
    }
    .reset-card {
        width: 100%;
        max-width: 500px;
        padding: 3rem;
    }
    .form-control {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 0.8rem 1.2rem;
        border-radius: 12px;
    }
</style>
{% endblock %}

{% block content %}
<div class="reset-container">
    <div class="cyber-card reset-card">
        <div class="text-center mb-5">
            <div class="brand-icon mx-auto mb-4 d-flex align-items-center justify-content-center" 
                 style="width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary-color), var(--accent-red)); border-radius: 18px; box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);">
                <i class="bi bi-shield-lock-fill text-white fs-1"></i>
            </div>
            <h2 class="h3 mb-2 text-white">Recover Identity</h2>
            <p class="text-muted small">Enter your registered email to receive a secure reset link.</p>
        </div>

        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            <div class="mb-4">
                <label for="id_email" class="form-label text-muted small fw-bold text-uppercase">Email Address</label>
                <input type="email" name="email" class="form-control" id="id_email" placeholder="agent@saera.internal" required>
            </div>

            <div class="d-grid gap-3">
                <button type="submit" class="btn btn-primary btn-lg">
                    Request Reset Link <i class="bi bi-send-fill ms-2"></i>
                </button>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary">
                    Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
