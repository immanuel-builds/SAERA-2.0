{% comment %}Tea‑cup loading overlay – Iroh edition {% endcomment %}
<div id="iroh-loading" class="fixed inset-0 z-[2000] flex items-center justify-center bg-background/80 backdrop-blur-sm hidden" aria-live="polite" role="status">
  <div class="text-center">
    <!-- Tea cup -->
    <div class="teacup mx-auto mb-4">
      <div class="teacup-fill"></div>
    </div>
    <!-- Quote -->
    <blockquote class="max-w-md mx-auto">
      <p id="iroh-quote" class="italic text-ink text-lg"></p>
      <footer class="mt-2 text-sm text-ink opacity-70">— Uncle Iroh</footer>
    </blockquote>
  </div>
</div>
